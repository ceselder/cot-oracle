model:
  base: "Qwen/Qwen3-8B"
  checkpoint: "ceselder/cot-oracle-qwen3-8b-final-sprint-checkpoint-no-DPO"
  injection_layer: 1
  act_layers: [9, 18, 27]
  use_8bit: false

data:
  corpus: "ceselder/cot-oracle-corpus-v5"
  stride: 5
  question_inclusion_rate: 1.0  # always include question (oracle needs context for split CoT)

rollouts:
  n: 16
  temperature: 0.8
  max_new_tokens: 150
  generation_batch_size: 16
  repetition_penalty: 1.1

judge:
  model: "minimax/minimax-m2.7"
  temperature: 0.0
  max_concurrent: 16
  timeout_sec: 60

grpo:
  clip_eps: 0.2
  normalize_advantages: true

reward:
  criteria_weights:
    passes_swap_test: 1.0
    specific_and_falsifiable: 1.0
    adds_insight: 1.0
    not_provably_wrong: 1.0
    follows_instructions: 1.0

training:
  lr: 1.0e-6
  warmup_steps: 20
  max_grad_norm: 1.0
  batch_size: 4
  gradient_accumulation_steps: 2
  max_steps: 500
  save_every: 100
  temperature_floor: 0.6

wandb:
  project: "cot-oracle-calibration-grpo"

logging:
  console_every: 5
  eval_every: 50
