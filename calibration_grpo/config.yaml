model:
  base: "Qwen/Qwen3-8B"
  checkpoint: "ceselder/cot-oracle-qwen3-8b-final-sprint-checkpoint-no-DPO"
  injection_layer: 1
  act_layers: [9, 18, 27]
  use_8bit: false

data:
  corpus: "ceselder/cot-oracle-corpus-v5"
  stride: 5
  min_positions: 1
  max_positions: 3
  question_inclusion_rate: 0.4

rollouts:
  n: 16
  temperature: 0.8
  max_new_tokens: 150
  generation_batch_size: 1  # generate one at a time to avoid OOM
  repetition_penalty: 1.1

judge:
  model: "google/gemini-3.1-flash-lite-preview"
  temperature: 0.0
  max_concurrent: 16
  timeout_sec: 60

grpo:
  clip_eps: 0.2
  normalize_advantages: true

reward:
  # 8 binary criteria, "not_provably_wrong" weighted 3x
  # reward = weighted_sum / total_weight
  criteria_weights:
    not_provably_wrong: 3.0
    specific: 1.0
    follows_instructions: 1.0
    passes_swap_test: 1.0
    concise: 1.0
    not_just_restating_text: 1.0
    no_confabulated_numbers: 1.0
    confident_when_verifiable: 1.0
    hedged_when_uncertain: 1.0

training:
  lr: 3.0e-7
  warmup_steps: 30
  max_grad_norm: 0.5
  batch_size: 1           # one example at a time, 16 rollouts each
  gradient_accumulation_steps: 8
  max_steps: 500
  save_every: 100
  temperature_floor: 0.6

wandb:
  project: "cot-oracle-calibration-grpo"

logging:
  console_every: 5
  eval_every: 50
