model:
  base: "Qwen/Qwen3-8B"
  checkpoint: "ceselder/cot-oracle-qwen3-8b-final-sprint-checkpoint-no-DPO"
  injection_layer: 1
  act_layers: [9, 18, 27]
  use_8bit: true  # saves ~50% VRAM on A100

data:
  corpus: "ceselder/cot-oracle-corpus-v5"
  stride: 5
  min_positions: 1
  max_positions: 3
  question_inclusion_rate: 0.4

rollouts:
  n: 4             # reduced from 8 for A100 80GB
  temperature: 0.8
  max_new_tokens: 150
  generation_batch_size: 2  # A100 80GB with 8-bit
  repetition_penalty: 1.1

judge:
  model: "google/gemini-3.1-flash-lite-preview"
  temperature: 0.0
  max_concurrent: 16
  timeout_sec: 60

grpo:
  clip_eps: 0.2
  normalize_advantages: true

reward:
  # 8 binary criteria, "not_provably_wrong" weighted 3x
  # reward = weighted_sum / total_weight
  criteria_weights:
    not_provably_wrong: 3.0
    specific: 1.0
    follows_instructions: 1.0
    passes_swap_test: 1.0
    concise: 1.0
    well_formatted: 1.0
    precise: 1.0
    interesting: 1.0

training:
  lr: 1.0e-6
  warmup_steps: 20
  max_grad_norm: 1.0
  batch_size: 2           # reduced for A100 80GB memory
  gradient_accumulation_steps: 8
  max_steps: 500
  save_every: 100
  temperature_floor: 0.6

wandb:
  project: "cot-oracle-calibration-grpo"

logging:
  console_every: 5
  eval_every: 50
