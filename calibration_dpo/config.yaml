model:
  base: "Qwen/Qwen3-8B"
  checkpoint: "ceselder/cot-oracle-qwen3-8b-final-sprint-checkpoint-no-DPO"
  injection_layer: 1
  act_layers: [9, 18, 27]

data:
  corpus: "ceselder/cot-oracle-corpus-v5"
  stride: 5
  min_positions: 1
  max_positions: 3
  question_inclusion_rate: 0.4  # 40% of examples get question prepended to oracle input

rollouts:
  n: 16
  temperature: 1.0
  max_new_tokens: 150
  generation_batch_size: 16
  repetition_penalty: 1.1

judge:
  model: "google/gemini-3.1-flash-lite-preview"
  max_concurrent: 16
  temperature: 0.0
  timeout_sec: 60

dpo:
  beta: 0.15
  lr_scale: 1.0
  sft_weight: 1.0

training:
  lr: 1.0e-5
  warmup_steps: 20
  max_grad_norm: 1.0
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 1000
  save_every: 200

wandb:
  project: "cot-oracle-calibration-dpo"

logging:
  console_every: 10
  table_every: 50
  eval_every: 50  # run fixed probes on same examples
