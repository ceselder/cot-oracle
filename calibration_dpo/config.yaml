model:
  base: "Qwen/Qwen3-8B"
  checkpoint: "ceselder/cot-oracle-v15-stochastic"
  injection_layer: 1
  act_layers: [9, 18, 27]

data:
  corpus: "ceselder/cot-oracle-corpus-v5"
  stride: 5
  min_positions: 1
  max_positions: 3

rollouts:
  n: 16
  temperature: 1.0
  max_new_tokens: 150
  generation_batch_size: 16

judge:
  model: "google/gemini-3.1-flash-lite-preview"
  max_concurrent: 4
  temperature: 0.0
  timeout_sec: 60

dpo:
  beta: 0.1
  lr_scale: 0.1
  sft_weight: 0.1
  refusal_sft_weight: 1.0

training:
  lr: 5.0e-6
  warmup_steps: 20
  max_grad_norm: 1.0
  batch_size: 4
  gradient_accumulation_steps: 4
  max_steps: 2000
  save_every: 200

wandb:
  project: "cot-oracle-calibration-dpo"

logging:
  console_every: 10
  table_every: 50
