# Ablation: no CoT futurelens/pastlens, replaced with extra FineWeb readout
# n: how many to select (-1 = all, 0 = skip), epochs: repetitions (default 1)
# All data is downloaded from HuggingFace automatically.

tasks:
  hint_admission:           # ~3K available
    n: -1
    epochs: 2
    eval: true

  atypical_answer:          # ~20K available
    n: -1
    eval: true

  reasoning_termination:    # ~12K available
    n: -1
    epochs: 2
    eval: true

  answer_trajectory:        # ~42K available
    n: 30000
    eval: true

  futurelens:
    n: 0
    eval: false

  pastlens:
    n: 0
    eval: false

  correctness:              # ~7.8K available
    n: -1
    epochs: 2
    eval: true

  decorative_cot:           # ~4.1K available
    n: -1
    epochs: 2
    eval: true

  resampling_importance:
    n: 0
    eval: false

  chunked_convqa:           # ~27K available
    n: -1
    eval: true

  chunked_compqa:           # ~30K available
    n: -1
    eval: true

  backtrack_prediction:     # ~12K available
    n: -1
    epochs: 2
    eval: true

  sycophancy:               # ~10K available
    n: -1
    epochs: 2
    eval: true

  probe_sycophancy:
    n: 0
    eval: false

  truthfulqa_hint_verbalized:
    n: 0
    eval: false

  sqa:                      # ~8.5K available
    n: -1
    epochs: 2
    eval: true

  truthfulqa_hint:          # ~3.8K available
    n: -1
    epochs: 2
    eval: true

  sentence_insertion:
    eval: false

  rot13_reconstruction:
    eval: false     # skip for now

# FineWeb readout tasks — doubled to 80K to replace CoT futurelens/pastlens
fineweb:
  enabled: true
  n: 80000                      # 40K futurelens_fineweb + 40K pastlens_fineweb
  variant: futurelens_fineweb,pastlens_fineweb
  max_context_tokens: 2000
  min_target_tokens: 5
  max_target_tokens: 25

# Classification (matching Adam's AO training)
classification:
  enabled: true
  n: 15000
  datasets: [sst2, ag_news, snli]

# Training
training:
  lr: 0.00001
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 65536
  batch_size: 16                  # per-GPU micro-batch size
  effective_batch_size: 16        # no gradient accumulation
  extraction_batch_size: 128
  seed: 42

# Text-baseline (no activations — receives CoT as plain text instead of activation vectors)
no_activations:
  enabled: false

# Activation extraction
activations:
  layers: [9, 18, 27]        # 3 layers (25%, 50%, 75% of 36)
  position_mode: stochastic  # 40% last-only, 60% Poisson-process sampled
  stochastic_max_k: 100
  max_context_length: 0
  position_encoding: false
  pe_alpha: 0.1
  layer_dropout:
    train: false
    eval: false

# Eval
eval:
  eval_steps: 2000
  save_steps: 2000
  max_items_per_eval: 25

# Model
model:
  name: Qwen/Qwen3-8B
  ao_checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B
  fresh_lora: true

# Baselines
baselines:
  output_dir: data/baseline_results
  log_dir: logs/baselines

  evals:
    - hinted_mcq_truthfulqa
    - sycophancy_v2_riya
    - sentence_insertion
    - reasoning_termination_riya
    - atypical_answer_riya
    - atypical_answer_mcq
    - cybercrime_ood
    - chunked_convqa
    - cot_hint_admission
    - rot13_reconstruction
    - thought_anchors
    - thought_branches

  classification_evals:
    - cls_sst2
    - cls_snli
    - cls_ag_news
    - cls_ner
    - cls_tense
    - cls_language_id
    - cls_singular_plural
    - cls_geometry_of_truth
    - cls_relations

  cleaned_datasets:
    train_fraction: 0.01
    datasets:
      - mats-10-sprint-cs-jb/cot-oracle-hint-admission-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-atypical-answer-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-reasoning-termination-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-answer-trajectory-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-correctness-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-decorative-cot-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-sycophancy-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-backtrack-prediction-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-verbalized-cleaned

  linear_probe:
    layers: [9, 18, 27]
    k_folds: 5
    lr: 0.01
    epochs: 100
    weight_decay: 0.0001

  original_ao:
    checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B

  llm_monitor:
    model: google/gemini-3-flash-preview
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

  patchscopes:
    source_layers: [9, 18, 27]
    injection_layer: 1
    steering_coefficients: [0.5, 1.0, 2.0]
    max_new_tokens: 100

  no_act_oracle:
    checkpoint: checkpoints/no_act_oracle
    max_new_tokens: 150

  attention_probe:
    layers: [9, 18, 27]
    k_folds: 5
    lr: 0.0001
    epochs: 50
    patience: 10
    batch_size: 32

  sae_probe:
    sae_dir: downloaded_saes
    sae_labels_dir: /ceph/scratch/jbauer/sae_features/trainer_2/trainer_2/labels
    sae_trainer: 2
    layers: [9, 18, 27]
    top_k: 20
    llm_model: google/gemini-2.5-flash-lite
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

# Output
output:
  save_dir: checkpoints
  wandb_project: cot_oracle
  wandb_entity: MATS10-CS-JB
  wandb_run: null
