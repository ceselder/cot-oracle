# CoT Oracle Evaluation Config
# Used by scripts/eval_comprehensive.py, scripts/eval_viewer.py, src/qa_scorer.py
#
# Comment out tasks or baselines to skip them.

score_model: xiaomi/mimo-v2-flash
judge_model: xiaomi/mimo-v2-flash
try_local_scorer: false
n_examples: 25                       # examples per task (CLI --n-examples overrides)

# Tasks to evaluate (subset of tasks defined in src/tasks.py).
# Comment out a line to skip that task.
tasks:
  # - hint_admission
  - atypical_answer
  - reasoning_termination
  - answer_trajectory
  # - correctness
  # - decorative_cot
  # - backtrack_prediction
  - sycophancy
  - truthfulqa_hint
  # - sqa
  - chunked_convqa
  - chunked_compqa_backtrack
  - sentence_insertion
  - cot_description
  # - hallucination_detection
  # - futurelens          # no cot_text
  # - pastlens            # no cot_text
  # - rot13_reconstruction
  # ── Adam's original AO tasks (classification) ──
  - cls_sst2
  - cls_ag_news
  - cls_ner
  # - cls_snli
  # - cls_singular_plural
  # - cls_tense
  # - cls_relations
  # - cls_language_id
  # - cls_geometry_of_truth

# Baselines to run. Comment out a line to skip that method.
baselines:
  - weak-bb-monitor
  # - strong-bb-monitor
  - our_ao
  - original_ao
  - linear_probes
  - sae-llm-monitor
  - patchscopes
  # - attention_probe
  # - no_act_oracle

# Per-method settings.
method_config:
  our_ao:
    checkpoint: /ceph/scratch/jbauer/checkpoints/cot_oracle_v15_stochastic
    layers: [9, 18, 27]        # all layers simultaneously
    position_slices: ["::20", "::5"]  # numpy slicing: every 20th, 5th
    single_layer: false        # feed all layers at once

  original_ao:
    checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B
    layers: [9, 18, 27]        # sweep each layer individually
    position_slices: ["-1:", "-5:"]    # numpy slicing: last 1, last 5
    single_layer: true         # one layer at a time (matches Adam's training)

  weak-bb-monitor:
    model: xiaomi/mimo-v2-flash
    max_tokens: 2048

  strong-bb-monitor:
    model: google/gemini-3.1-pro-preview
    max_tokens: 2048

  sae-llm-monitor:
    sae_labels_dir: /ceph/scratch/jbauer/sae_features/trainer_2/trainer_2/labels
    llm_model: xiaomi/mimo-v2-flash
    sae_trainer: 2
    top_k: 20
    max_tokens: 2048
    temperature: 0.0
    max_concurrent: 20

  patchscopes:
    mode: learned              # "learned" = gradient descent on alpha, "sweep" = legacy grid search
    injection_layer: 1
    max_new_tokens: 2048
    lr: 0.05                   # learning rate for alpha optimisation
    n_steps: 300                # max gradient descent steps (early stopping at convergence)
    wandb_group: patchscopes-alpha  # wandb group for loss curves
    # Legacy sweep settings (only used when mode=sweep):
    steering_coefficients: [0.5, 1.0, 2.0]
    source_layers: null        # null = same as activation layers

  no_act_oracle:
    checkpoint: ""             # path to no-act LoRA
