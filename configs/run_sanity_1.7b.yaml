# Sanity check run — Qwen3-1.7B, small n, fast iteration
# Verify pipeline is not bugged before overnight 8B run

tasks:
  hint_admission:
    n: 500
    eval: true

  atypical_answer:
    n: 500
    eval: true

  reasoning_termination:
    n: 500
    eval: true

  answer_trajectory:
    n: 500
    eval: true

  correctness:
    n: 500
    eval: true

  decorative_cot:
    n: 500
    eval: true

  futurelens:
    n: 500
    eval: true

  chunked_convqa:
    n: 500
    eval: true

  chunked_compqa:
    n: 500
    eval: true

  backtrack_prediction:
    n: 500
    eval: true

  truthfulqa_hint_verbalized:
    n: 500
    eval: true

  truthfulqa_hint:
    n: 500
    eval: true

  sycophancy:
    n: 500
    eval: true

  sentence_insertion:
    eval: true

  rot13_reconstruction:
    eval: false

fineweb:
  enabled: false

training:
  lr: 0.00001
  batch_size: 32
  effective_batch_size: 256
  eval_batch_size: 8
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 32768
  seed: 42

flamingo:
  enabled: false

activations:
  stride: 5
  layers: [7, 14, 21]
  position_mode: last_only
  layer_dropout:
    train: true
    eval: false

eval:
  eval_steps: 10
  max_items_per_eval: 15
  eval_batch_size: 4

model:
  name: Qwen/Qwen3-1.7B
  ao_checkpoint: null
  fresh_lora: true

output:
  save_dir: /root/checkpoints
  wandb_project: cot_oracle
  wandb_entity: MATS10-CS-JB
  wandb_run: sanity-1.7b
