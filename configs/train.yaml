# CoT Oracle Training Config (Unified Task System)
# Each task has `n` (samples to select, -1 = all), `epochs` (repetitions), `eval`.
# All data is downloaded from HuggingFace automatically.

tasks:
  # n: how many to select from dataset (-1 = all, 0 = skip)
  # epochs: how many times to repeat the selected data (default 1)

  hint_admission:           # ~3K available
    n: -1
    epochs: 2
    eval: true

  atypical_answer:          # ~20K available
    n: -1
    eval: true

  reasoning_termination:    # ~12K available
    n: -1
    epochs: 2
    eval: true

  answer_trajectory:        # ~42K available
    n: -1
    eval: true

  futurelens:
    n: 30000
    eval: true

  pastlens:
    n: 30000
    eval: true

  correctness:              # ~7.8K available
    n: -1
    epochs: 2
    eval: true

  decorative_cot:           # ~4.1K available
    n: -1
    epochs: 2
    eval: true

  resampling_importance:
    n: 0
    eval: false

  chunked_convqa:           # ~27K available
    n: -1
    eval: true

  chunked_compqa_backtrack:
    n: -1
    eval: true

  chunked_compqa_self_correction:
    n: 0
    eval: false

  chunked_compqa_verification:
    n: 0
    eval: false

  chunked_compqa_remaining_strategy:
    n: 0
    eval: false

  convqa:
    n: 0
    eval: false

  compqa:
    n: 0
    eval: false

  backtrack_prediction:     # ~12K available
    n: -1
    epochs: 2
    eval: true

  sycophancy:               # ~10K available
    n: -1
    epochs: 2
    eval: true

  probe_sycophancy:
    n: 0
    eval: false

  truthfulqa_hint_verbalized:
    n: 0
    eval: false

  sqa:                      # ~8.5K available
    n: -1
    epochs: 2
    eval: true

  truthfulqa_hint:          # ~3.8K available
    n: -1
    epochs: 2
    eval: true

  sentence_insertion:
    eval: false

  rot13_reconstruction:
    eval: false     # skip for now

# FineWeb readout tasks
fineweb:
  enabled: true
  n: 60000                      # 30K futurelens + 30K pastlens
  variant: futurelens_fineweb,pastlens_fineweb
  max_context_tokens: 2000
  min_target_tokens: 5
  max_target_tokens: 25

# Classification (matching Adam's AO training)
classification:
  enabled: true
  n: 20000
  datasets: [sst2, ag_news, snli]

# Training
training:
  lr: 0.00001
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 65536
  batch_size: 16                  # per-GPU micro-batch size
  effective_batch_size: 16        # no gradient accumulation
  extraction_batch_size: 128      # lookahead extraction; actual micro-batches split further on token budget / OOM
  seed: 42

# Text-baseline (no activations — receives CoT as plain text instead of activation vectors)
no_activations:
  enabled: false

# Activation extraction
activations:
  layers: [9, 18, 27]        # injection layers (25%, 50%, 75% of Qwen3-8B's 36 layers)
  position_mode: stochastic  # "last_only" (fastest), "stochastic" (chi-squared random), "all"
  stochastic_max_k: 100      # upper bound for Poisson position sampling
  max_context_length: 0      # drop samples longer than this (0 = no filter)
  position_encoding: false
  pe_alpha: 0.1
  layer_dropout:
    train: false
    eval: false

# Training-time eval
eval:
  eval_steps: 2000
  max_items_per_eval: 25

# Model
model:
  name: Qwen/Qwen3-8B
  ao_checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B
  fresh_lora: true

# Output
output:
  save_dir: checkpoints
  wandb_project: cot_oracle
  wandb_entity: MATS10-CS-JB
  wandb_run: null
