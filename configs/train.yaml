# CoT Oracle Training Config (Unified Task System)
# Each task has `n` (samples to select, -1 = all), `epochs` (repetitions), `eval`.
# All data is downloaded from HuggingFace automatically.

tasks:
  # n: how many to select from dataset (-1 = all, 0 = skip)
  # epochs: how many times to repeat the selected data (default 1)

  hint_admission:           # ~3K available, (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  atypical_answer:          # ~20K available (computation, supervised)
    n: -1
    eval: true

  reasoning_termination:    # ~12K available  (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  answer_trajectory:        # ~42K available (computation, supervised)
    n: -1
    eval: true

  futurelens:  # (pre/postdiction, unsupervised)
    n: 30000
    eval: true

  pastlens: # (pre/postdiction, unsupervised)
    n: 30000
    eval: true

  correctness:              # ~7.8K available (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  decorative_cot:           # ~4.1K available (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  resampling_importance:    # ~468 available (computation, supervised)
    n: 0
    eval: true

  convqa:                     # ~25K available (reconstruction, self-supervised)
    n: 0
    eval: true

  compqa:                     # ~8K available (reconstruction, self-supervised)
    n: 0
    eval: true

  chunked_convqa:           # ~27K available (pre/postdiction, self-supervised)
    n: -1
    eval: true

  chunked_compqa_backtrack:        # ~10K available (computation, self-supervised)
    n: -1
    eval: true

  chunked_compqa_self_correction:  # ~5K available (computation, self-supervised)
    n: -1
    eval: true

  chunked_compqa_verification:     # ~5.5K available (computation, self-supervised)
    n: -1
    eval: true

  chunked_compqa_remaining_strategy: # ~8K available (reconstruction, self-supervised)
    n: -1
    eval: true

  backtrack_prediction:     # ~12K available (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  sycophancy:               # ~10K available (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  probe_sycophancy:
    n: 0
    eval: false

  truthfulqa_hint_verbalized:
    n: 0
    eval: false

  sqa:                      # ~8.5K available (pre/postdiction, self-supervised)
    n: -1
    epochs: 2
    eval: true

  truthfulqa_hint:          # ~3.8K available (computation, supervised)
    n: -1
    epochs: 2
    eval: true

  sentence_insertion: # (computation, self-supervised)
    eval: true

  rot13_reconstruction:
    eval: false     # skip for now

  cot_description:   # (reconstruction, supervised)
    n: 0
    eval: true

  cot_metacognition:
    n: 0
    eval: false

  sae_unverbalized:           # ~10.5K available (reconstruction, supervised)
    n: 0
    eval: true

  deception_detection:
    n: 0
    eval: false

# FineWeb readout tasks (reconstruction, unsupervised)
fineweb:
  enabled: true
  n: 60000                      # 30K futurelens + 30K pastlens
  variant: futurelens_fineweb,pastlens_fineweb
  max_context_tokens: 2000
  min_target_tokens: 5
  max_target_tokens: 25

# Classification (reconstruction, supervised)
classification:
  enabled: true
  n: 20000
  datasets: [sst2, ag_news, snli]

# Training
training:
  lr: 0.00001
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 65536
  batch_size: 16                  # per-GPU micro-batch size
  effective_batch_size: 16        # no gradient accumulation
  extraction_batch_size: 128      # lookahead extraction; actual micro-batches split further on token budget / OOM
  seed: 42

# Text-baseline (no activations — receives CoT as plain text instead of activation vectors)
no_activations:
  enabled: false

# Activation extraction
activations:
  layers: [9, 18, 27]        # injection layers (25%, 50%, 75% of Qwen3-8B's 36 layers)
  position_mode: end_rdm_stc  # "last_only", "stochastic", "end_rdm_stc" (20/50/30 lastk/sentence/endskewed), "all"
  stochastic_max_k: 100      # upper bound for Poisson position sampling
  max_context_length: 0      # drop samples longer than this (0 = no filter)
  position_encoding: true
  pe_alpha: 0.1
  layer_dropout:
    train: false
    eval: false

# Eval
eval:
  eval_steps: 2000
  max_items_per_eval: 25
  score_model: google/gemini-2.5-flash-lite  # shared OpenRouter judge model for QA / trajectory / llm_judge / reference scoring
  cls_eval: false          # run AO classification evals (sst2, ag_news, etc.) at each eval step
  cls_eval_n: 25           # test examples per classification dataset

# Model
model:
  name: Qwen/Qwen3-8B
  ao_checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B
  fresh_lora: true

# Baselines
# run_comprehensive_eval.py uses all TASKS from src/tasks.py by default.
baselines:
  output_dir: data/comprehensive_eval
  log_dir: logs/baselines

  # Our trained AO (run_comprehensive_eval.py uses --checkpoint or this field)
  our_ao:
    checkpoint: /ceph/scratch/jbauer/checkpoints/cot_oracle_v15_stochastic

  # Celeste's DPO-calibrated AO (disabled — uncomment to enable)
  # celeste_ao:
  #   checkpoint: ceselder/cot-oracle-calibration-dpo-v3

  # Original (Adam's) pretrained AO — loaded via AO_CHECKPOINTS in core/ao.py
  original_ao:
    checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B

  # Black-box LLM monitor: text-only CoT reading
  # Pre-collected traces in logs/llm_monitor_tasks/ are used first; API called for the rest
  weak-llm:
    model: google/gemini-3.1-flash-lite-preview  # fast model
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    max_concurrent: 8
    temperature: 0.0
    include_question: true

  strong-llm:
    model: google/gemini-3.1-pro-preview  # strong model (thinking model — needs large max_tokens budget)
    api_base: https://openrouter.ai/api/v1
    max_tokens: 2048
    max_concurrent: 8
    temperature: 0.0
    include_question: true

  openended_reference_judge:
    max_concurrent: 8

  # Linear probes: pretrained binary classifiers from HF (mats-10-sprint-cs-jb/qwen3-8b-linear-probes)
  linear_probes:
    hf_repo: mats-10-sprint-cs-jb/qwen3-8b-linear-probes
    layers: [9, 18, 27]
    pooling: mean

  # SAE LLM: SAE encode + LLM judge
  sae_llm:
    sae_dir: downloaded_saes
    sae_labels_dir: /ceph/scratch/jbauer/sae_features/trainer_2/trainer_2/labels
    sae_trainer: 2
    layers: [9, 18, 27]
    top_k: 20
    llm_model: google/gemini-2.5-flash-lite
    api_base: https://openrouter.ai/api/v1
    max_tokens: 1024
    temperature: 0.0

  # Patchscopes: slow (~14 min/task). Disabled by default; re-enable via --baselines ... patchscopes
  # patchscopes:
  #   source_layers: [9, 18, 27]
  #   injection_layer: 1
  #   steering_coefficients: [0.5, 1.0, 2.0]
  #   max_new_tokens: 100

  # Legacy: kept for reference, not used by run_comprehensive_eval.py
  cleaned_datasets:
    train_fraction: 0.01
    datasets:
      - mats-10-sprint-cs-jb/cot-oracle-hint-admission-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-atypical-answer-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-reasoning-termination-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-answer-trajectory-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-correctness-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-decorative-cot-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-sycophancy-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-backtrack-prediction-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-verbalized-cleaned

  linear_probe:
    layers: [9, 18, 27]
    k_folds: 5
    lr: 0.01
    epochs: 100
    weight_decay: 0.0001

# Output
output:
  save_dir: checkpoints
  wandb_project: cot_oracle
  wandb_entity: MATS10-CS-JB
  wandb_run: null
