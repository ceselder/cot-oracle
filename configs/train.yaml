# CoT Oracle Training Config (Unified Task System)
# Each task has `n` (training samples, 0 to skip) and `eval` (whether to evaluate).
# All data is downloaded from HuggingFace automatically.

tasks:
  # --- Trainable tasks ---
  hint_admission:          # binary: did the model silently use an injected hint?
    n: 15000
    eval: true

  atypical_answer:         # binary: majority vs minority answer relative to other models
    n: 20000
    eval: true

  reasoning_termination:   # binary: is the CoT about to end (near </think>)?
    n: 15000
    eval: true

  answer_trajectory:       # token_f1: sequence of answer candidates during CoT (A→B→A)
    n: 60000
    eval: true

  futurelens_cot:          # token_f1: predict next N tokens of CoT after activation region
    n: 30000
    eval: true

  futurelens_fineweb:      # token_f1: predict next N tokens of FineWeb text
    n: 30000
    eval: true

  pastlens_cot:            # token_f1: predict previous N tokens of CoT before activation region
    n: 30000
    eval: true

  pastlens_fineweb:        # token_f1: predict previous N tokens of FineWeb text
    n: 30000
    eval: true

  reconstruction_cot:      # token_f1: reconstruct exact token span at activation positions (CoT)
    n: 30000
    eval: true

  reconstruction_fineweb:  # token_f1: reconstruct exact token span at activation positions (FineWeb)
    n: 30000
    eval: true

  correctness:             # binary: did the CoT lead to the correct final answer?
    n: 10000
    eval: true

  decorative_cot:          # binary: is the CoT load-bearing or decorative (post-hoc)?
    n: 10000
    eval: true

  chunked_convqa:          # token_f1: predict answer from a CoT prefix (conversational QA)
    n: 25000
    eval: true

  chunked_compqa:          # token_f1: predict answer from a CoT prefix (compositional QA)
    n: 30000
    eval: true

  convqa:                  # token_f1: predict answer from full CoT (conversational QA)
    n: 25000
    eval: true

  fineweb_convqa:          # token_f1: conversational QA over FineWeb-derived conversations
    n: 10000
    eval: true

  sycophancy:              # binary: was the model's moral judgment swayed by the user's wrong opinion?
    n: 15000
    eval: true

  probe_sycophancy:        # binary: probe-based sycophancy detection
    n: 0                   # dataset not yet on HF
    eval: false

  backtrack_prediction:    # binary: will the model backtrack/revise its reasoning?
    n: 12000
    eval: true

  truthfulqa_hint_verbalized:    # binary: hint detection on TruthfulQA, hint mentioned in CoT
    n: 4000
    eval: true

  truthfulqa_hint_unverbalized:  # binary: hint detection on TruthfulQA, hint NOT mentioned in CoT
    n: 10000
    eval: true

  # --- Eval-only tasks ---
  sentence_insertion:      # step_accuracy: which CoT step was inserted from a different problem?
    eval: false

  rot13_reconstruction:    # token_match: decode ROT13-encoded text from activations
    eval: false

# Classification (matching Adam's AO training)
classification:
  enabled: true
  n: 130000
  datasets: [sst2, ag_news, snli]

# LatentQA / SPQA (matching Adam's AO training)
latentqa:
  enabled: true
  n: 65000

# Training
training:
  lr: 0.00001
  batch_size: 16
  effective_batch_size: 256
  eval_batch_size: 8
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 32768
  extraction_batch_size: 512     # lookahead: extract N examples at once, train in batch_size chunks
  seed: 42

# Flamingo cross-attention
flamingo:
  enabled: false
  xattn_interval: 4
  xattn_lora_r: 64

# Activation extraction
activations:
  stride: poisson
  position_encoding: true
  pe_alpha: 0.1
  layers: [7, 14, 21]        # injection layers (25%, 50%, 75% of Qwen3-0.6B's 28 layers)
  layer_dropout:
    train: true              # random non-empty subsets of layers per training example
    eval: false              # always feed all configured layers during eval

# Eval
eval:
  eval_steps: 2000
  save_steps: 10000
  max_items_per_eval: 25
  eval_batch_size: 4

# Model
model:
  name: Qwen/Qwen3-0.6B
  ao_checkpoint: null
  fresh_lora: true

# Baselines
baselines:
  output_dir: data/baseline_results
  log_dir: logs/baselines

  evals:
    - hinted_mcq_truthfulqa
    - sycophancy_v2_riya
    - sentence_insertion
    - reasoning_termination_riya
    - atypical_answer_riya
    - atypical_answer_mcq
    - cybercrime_ood
    - chunked_convqa
    - cot_hint_admission
    - rot13_reconstruction
    - thought_anchors
    - thought_branches

  classification_evals:
    - sst2
    - snli
    - ag_news
    - ner
    - tense
    - language_identification
    - singular_plural
    - geometry_of_truth
    - relations

  stride: 5

  cleaned_datasets:
    train_fraction: 0.01
    datasets:
      - mats-10-sprint-cs-jb/cot-oracle-hint-admission-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-atypical-answer-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-reasoning-termination-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-answer-trajectory-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-correctness-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-decorative-cot-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-sycophancy-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-backtrack-prediction-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-verbalized-cleaned

  linear_probe:
    layers: [9, 18, 27]       # also runs concat of all 3
    k_folds: 5
    lr: 0.01
    epochs: 100
    weight_decay: 0.0001

  original_ao:
    checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B

  llm_monitor:
    model: google/gemini-3-flash-preview
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

  patchscopes:
    source_layers: [9, 18, 27]
    injection_layer: 1
    steering_coefficients: [0.5, 1.0, 2.0]
    max_new_tokens: 100
    optimize: true
    opt_steps: 50
    opt_lr: 0.1

  no_act_oracle:
    checkpoint: checkpoints/no_act_oracle
    max_new_tokens: 150

  qwen_attention_probe:
    layers: [9, 18, 27]
    k_folds: 5
    lr: 0.0001
    epochs: 50
    patience: 10
    batch_size: 32

  sae_probe:
    sae_dir: downloaded_saes
    sae_labels_dir: /ceph/scratch/jbauer/sae_features/trainer_2/trainer_2/labels
    sae_trainer: 2
    layers: [9, 18, 27]
    top_k: 20
    llm_model: google/gemini-2.5-flash-lite
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

# Output
output:
  save_dir: checkpoints
  wandb_project: cot_oracle
  wandb_entity: japhba-personal
  wandb_run: null
