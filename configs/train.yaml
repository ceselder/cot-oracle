# CoT Oracle Training Config (Unified Task System)
# Each task has `n` (training samples, 0 to skip) and `eval` (whether to evaluate).
# All data is downloaded from HuggingFace automatically.

tasks:
  # --- Trainable tasks (n=999999 means "load all available") ---
  hint_admission:
    n: 999999
    eval: true

  atypical_answer:
    n: 15000
    eval: true

  reasoning_termination:
    n: 999999
    eval: true

  answer_trajectory:
    n: 15000
    eval: true

  futurelens:
    n: 15000
    eval: true

  correctness:
    n: 999999
    eval: true

  decorative_cot:
    n: 999999
    eval: true

  chunked_convqa:
    n: 15000
    eval: true

  chunked_compqa:
    n: 15000
    eval: true

  backtrack_prediction:
    n: 999999
    eval: true

  sycophancy:
    n: 999999
    eval: true

  probe_sycophancy:
    n: 0        # dataset not yet on HF
    eval: false

  truthfulqa_hint_verbalized:
    n: 0
    eval: false

  truthfulqa_hint_unverbalized:
    n: 999999
    eval: true

  sentence_insertion:
    eval: false

  rot13_reconstruction:
    eval: false     # skip for now

# FineWeb readout tasks (futurelens/pastlens/reconstruction on web text)
fineweb:
  enabled: true
  n: 15000                    # total across 3 variants (~5K each)
  max_context_tokens: 2000
  min_target_tokens: 5
  max_target_tokens: 25

# Classification (matching Adam's AO training)
classification:
  enabled: true
  n: 15000
  datasets: [sst2, ag_news, snli]

# LatentQA / SPQA (matching Adam's AO training)
latentqa:
  enabled: true
  n: 30000

# Training
training:
  lr: 0.00001
  epochs: 1
  warmup_fraction: 0.1
  max_grad_norm: 1.0
  steering_coefficient: 1.0
  gradient_checkpointing: true
  task_order: shuffled
  interleave_blocks: 50
  max_train_tokens_per_gpu: 65536
  extraction_batch_size: 128     # lookahead extraction; actual micro-batches split further on token budget / OOM
  seed: 42

# Text-baseline (no activations — receives CoT as plain text instead of activation vectors)
no_activations:
  enabled: false

# Activation extraction
activations:
  stride: 5
  layers: [9, 18, 27]        # injection layers (25%, 50%, 75% of Qwen3-8B's 36 layers)
  position_mode: stochastic  # "last_only" (fastest), "stochastic" (chi-squared random), "all"
  layer_dropout:
    train: true              # random non-empty subsets of layers per training example
    eval: false              # always feed all configured layers during eval

# Eval
eval:
  max_items_per_eval: 25

# Model
model:
  name: Qwen/Qwen3-8B
  ao_checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B
  fresh_lora: true

# Baselines
baselines:
  output_dir: data/baseline_results
  log_dir: logs/baselines

  evals:
    - hinted_mcq_truthfulqa
    - sycophancy_v2_riya
    - sentence_insertion
    - reasoning_termination_riya
    - atypical_answer_riya
    - atypical_answer_mcq
    - cybercrime_ood
    - chunked_convqa
    - cot_hint_admission
    - rot13_reconstruction
    - thought_anchors
    - thought_branches

  classification_evals:
    - cls_sst2
    - cls_snli
    - cls_ag_news
    - cls_ner
    - cls_tense
    - cls_language_id
    - cls_singular_plural
    - cls_geometry_of_truth
    - cls_relations

  stride: 5

  cleaned_datasets:
    train_fraction: 0.01
    datasets:
      - mats-10-sprint-cs-jb/cot-oracle-hint-admission-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-atypical-answer-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-reasoning-termination-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-answer-trajectory-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-correctness-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-decorative-cot-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-sycophancy-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-backtrack-prediction-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-cleaned
      - mats-10-sprint-cs-jb/cot-oracle-truthfulqa-hint-verbalized-cleaned

  linear_probe:
    layers: [9, 18, 27]       # also runs concat of all 3
    k_folds: 5
    lr: 0.01
    epochs: 100
    weight_decay: 0.0001

  original_ao:
    checkpoint: adamkarvonen/checkpoints_latentqa_cls_past_lens_addition_Qwen3-8B

  llm_monitor:
    model: google/gemini-3-flash-preview
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

  patchscopes:
    source_layers: [9, 18, 27]
    injection_layer: 1
    steering_coefficients: [0.5, 1.0, 2.0]
    max_new_tokens: 100

  no_act_oracle:
    checkpoint: checkpoints/no_act_oracle
    max_new_tokens: 150

  qwen_attention_probe:
    layers: [9, 18, 27]
    k_folds: 5
    lr: 0.0001
    epochs: 50
    patience: 10
    batch_size: 32

  sae_probe:
    sae_dir: downloaded_saes
    sae_labels_dir: /ceph/scratch/jbauer/sae_features/trainer_2/trainer_2/labels
    sae_trainer: 2
    layers: [9, 18, 27]
    top_k: 20
    llm_model: google/gemini-2.5-flash-lite
    api_base: https://openrouter.ai/api/v1
    max_tokens: 300
    temperature: 0.0

# Output
output:
  save_dir: checkpoints
  wandb_project: cot_oracle
  wandb_entity: MATS10-CS-JB
  wandb_run: null
