# Base config for Qwen3-0.6B ablation runs
# Use as first overlay: --config configs/train.yaml configs/ablation_base_0.6b.yaml configs/ablation_<name>.yaml

model:
  name: Qwen/Qwen3-0.6B
  fresh_lora: true  # no pretrained AO checkpoint for 0.6B

tasks:
  hint_admission:
    n: 1500
    eval: true
  atypical_answer:
    n: 1000
    eval: true
  reasoning_termination:
    n: 1500
    eval: true
  answer_trajectory:
    n: 1500
    eval: true
  futurelens:
    n: 2400
    eval: true
  futurelens_fineweb:
    n: 2400
    eval: true
  pastlens:
    n: 1600
    eval: true
  pastlens_fineweb:
    n: 1600
    eval: true
  reconstruction:
    n: 800
    eval: true
  reconstruction_fineweb:
    n: 800
    eval: true
  correctness:
    n: 1500
    eval: true
  decorative_cot:
    n: 1200
    eval: true
  chunked_convqa:
    n: 1000
    eval: true
  chunked_compqa:
    n: 1200
    eval: true
  convqa:
    n: 800
    eval: true
  fineweb_convqa:
    n: 500
    eval: true
  sycophancy:
    n: 800
    eval: true

training:
  batch_size: 4
  effective_batch_size: 256
  eval_batch_size: 4
  task_order: shuffled
